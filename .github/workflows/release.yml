name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: radialsan_linux_amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: radialsan_macos_arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: radialsan_macos_amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: radialsan_windows_amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libx11-dev libxdo-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "radialsan ${{ github.ref_name }}"
          releaseBody: |
            See the [full changelog](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}).

            ## Downloads
            | Platform | File |
            |---|---|
            | Windows (x64) | `.msi` / `.exe` |
            | macOS (ARM) | `.dmg` |
            | macOS (Intel) | `.dmg` |
            | Linux (x64) | `.deb` / `.AppImage` |
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
